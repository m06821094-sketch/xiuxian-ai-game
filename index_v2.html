<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云游志 · 修仙叙事</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;background:#0e1412;color:#c8d8b8;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.game-container{width:100%;max-width:960px;background:linear-gradient(145deg,#162018 0%,#1a2a1e 100%);border:1px solid #2a4a2e;border-radius:16px;box-shadow:0 8px 48px rgba(0,0,0,.6),inset 0 1px 0 rgba(80,180,80,.08);overflow:hidden}
.game-header{padding:20px 24px 14px;text-align:center;border-bottom:1px solid #2a3a2a;background:linear-gradient(180deg,#1c2a1e 0%,transparent)}
.game-header h1{font-size:1.6rem;font-weight:500;color:#b8d8a8;letter-spacing:4px;text-shadow:0 0 20px rgba(100,200,100,.15)}
.game-header .subtitle{font-size:.85rem;color:#6a8a6a;margin-top:2px;letter-spacing:6px}
.game-main{display:flex;height:540px}
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid #223022}
.chat-messages{flex:1;overflow-y:auto;padding:16px 16px 8px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:#2a4a2e;border-radius:4px}
.message{margin-bottom:12px}
.message-bubble{display:inline-block;max-width:85%;padding:10px 14px;border-radius:10px;font-size:.9rem;line-height:1.6;word-break:break-word;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.player{text-align:right}
.player-bubble{background:#1e3a1e;border:1px solid #2a5a2a;color:#d0e0c0;border-bottom-right-radius:4px}
.ai{text-align:left}
.ai-bubble{background:#1a2a1e;border:1px solid #2a3a2a;color:#b8d0a8;border-bottom-left-radius:4px}
.system{text-align:center}
.system-bubble{background:#0e1a10;border:1px solid #1a3a1a;color:#8aaa8a;font-size:.8rem;max-width:90%;border-radius:8px}
.event-btn{display:block;width:100%;margin:4px 0;padding:7px 12px;background:#1a2a1a;border:1px solid #2a5a2a;border-radius:6px;color:#b8d0a8;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s;text-align:left}
.event-btn:hover{background:#2a4a2a;border-color:#3a7a3a;color:#d8e8c8}
.chat-input-area{display:flex;gap:8px;padding:10px 12px 12px;border-top:1px solid #223022;background:#121a14}
.chat-input-area input{flex:1;padding:8px 12px;background:#0e1a10;border:1px solid #2a3a2a;border-radius:8px;color:#d0e0c0;font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit}
.chat-input-area input:focus{border-color:#3a7a3a}
.chat-input-area input::placeholder{color:#4a5a4a}
.send-btn{padding:8px 18px;background:#2a5a2a;border:none;border-radius:8px;color:#d0e8c0;font-size:.9rem;cursor:pointer;transition:background .2s;font-family:inherit}
.send-btn:hover{background:#3a7a3a}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.status-panel{width:230px;flex-shrink:0;padding:16px;display:flex;flex-direction:column;gap:14px;background:linear-gradient(180deg,#141e14 0%,#0e1a10)}
.status-panel h2{font-size:.9rem;font-weight:400;color:#6a8a6a;letter-spacing:4px;text-align:center;border-bottom:1px solid #1a2a1a;padding-bottom:6px}
.status-item{display:flex;flex-direction:column;gap:3px}
.status-item .label{font-size:.78rem;color:#6a8a6a}
.progress-row{display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:6px;background:#0a140c;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease,background .5s ease}
.progress-fill.cult{background:linear-gradient(90deg,#3a5a7a,#5a8aaa)}
.progress-fill.fort{background:linear-gradient(90deg,#5a7a3a,#7aaa5a)}
.progress-value{font-size:.8rem;color:#8aaa8a;min-width:28px;text-align:right}
.static-row{display:flex;justify-content:space-between;align-items:center}
.static-row .label{font-size:.78rem;color:#6a8a6a}
.static-row .value{font-size:.82rem;color:#b8d0a8}
.reset-btn,.config-btn{padding:8px;background:transparent;border:1px solid #2a3a2a;border-radius:6px;color:#7a9a7a;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:auto}
.reset-btn:hover{border-color:#5a7a5a;color:#b8d0a8}
.config-panel{padding:16px 20px 20px;border-top:1px solid #223022;background:#0e1410;display:none}
.config-panel.open{display:block}
.config-panel h3{font-size:.9rem;color:#8aaa8a;margin-bottom:10px;font-weight:400}
.config-tabs{display:flex;gap:4px;margin-bottom:10px}
.config-tabs button{flex:1;padding:6px;background:#121a14;border:1px solid #2a3a2a;border-radius:6px;color:#6a8a6a;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:inherit}
.config-tabs button.active{background:#1a2a1e;border-color:#3a7a3a;color:#b8d0a8}
.config-form{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.config-form label{font-size:.75rem;color:#5a7a5a}
.config-form input{padding:6px 10px;background:#0e1a10;border:1px solid #2a3a2a;border-radius:6px;color:#c8d8b8;font-size:.82rem;outline:none;font-family:inherit}
.config-form input:focus{border-color:#3a7a3a}
.config-form.hidden{display:none}
.config-actions{display:flex;gap:8px;margin-top:8px}
.save-btn{flex:1;padding:7px;background:#2a5a2a;border:none;border-radius:6px;color:#d0e8c0;font-size:.82rem;cursor:pointer;font-family:inherit}
.save-btn:hover{background:#3a7a3a}
.model-status{font-size:.75rem;color:#5a8a5a;margin-top:6px;text-align:center}
.model-status.error{color:#8a5a5a}
.ending-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.ending-overlay.open{display:flex}
.ending-card{background:linear-gradient(145deg,#162018,#1a2a1e);border:1px solid #3a5a3a;border-radius:16px;padding:40px 48px;max-width:420px;width:90%;text-align:center;animation:fadeIn .4s ease;box-shadow:0 0 60px rgba(80,160,80,.08)}
.ending-card h2{font-size:1.6rem;font-weight:300;color:#c8e0b8;letter-spacing:8px;margin-bottom:16px}
.ending-card .desc{color:#8aaa8a;line-height:1.8;margin-bottom:24px;font-size:.9rem}
.ending-card button{padding:8px 28px;background:#2a5a2a;border:none;border-radius:8px;color:#d0e8c0;font-size:.9rem;cursor:pointer;font-family:inherit}
.ending-card button:hover{background:#3a7a3a}
@media(max-width:640px){body{padding:10px}.game-main{flex-direction:column;height:auto}.chat-panel{border-right:none;min-height:400px}.status-panel{width:100%;flex-direction:row;flex-wrap:wrap;gap:8px;padding:12px;border-top:1px solid #223022}.status-panel h2{display:none}.status-item{flex:1;min-width:80px}}
</style>
</head>
<body>

<div class="game-container">
  <div class="game-header">
    <h1>云游志</h1>
    <div class="subtitle">— 修仙叙事 · 每次皆不相同 —</div>
  </div>

  <div class="game-main">
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="输入你的行动..." autocomplete="off">
        <button class="send-btn" id="sendBtn">↵</button>
      </div>
    </div>

    <div class="status-panel">
      <h2>· 修 行 ·</h2>
      <div class="status-item">
        <span class="label">修为</span>
        <div class="progress-row">
          <div class="progress-bar"><div class="progress-fill cult" id="cultFill"></div></div>
          <span class="progress-value" id="cultVal">10</span>
        </div>
      </div>
      <div class="status-item">
        <span class="label">机缘</span>
        <div class="progress-row">
          <div class="progress-bar"><div class="progress-fill fort" id="fortFill"></div></div>
          <span class="progress-value" id="fortVal">10</span>
        </div>
      </div>
      <div class="static-row"><span class="label">天数</span><span class="value" id="dayVal">1</span></div>
      <div class="static-row"><span class="label">步数</span><span class="value" id="roundVal">0</span></div>
      <button class="config-btn" id="configToggle">⚙️ 模型配置</button>
      <button class="reset-btn" id="resetBtn">⟳ 重新入世</button>
    </div>
  </div>

  <div class="config-panel" id="configPanel">
    <h3>模型配置</h3>
    <div class="config-tabs">
      <button class="active" data-mode="openai">OpenAI 兼容</button>
      <button data-mode="ollama">Ollama 本地</button>
    </div>
    <div class="config-form" id="openaiForm">
      <label>Base URL</label>
      <input type="text" id="cfgOpenaiUrl" value="https://maas-coding-api.cn-huabei-1.xf-yun.com/v2" placeholder="https://api.openai.com/v1">
      <label>API Key</label>
      <input type="password" id="cfgOpenaiKey" placeholder="sk-...">
      <label>Model</label>
      <input type="text" id="cfgOpenaiModel" value="astron-code-latest" placeholder="gpt-4">
    </div>
    <div class="config-form hidden" id="ollamaForm">
      <label>Base URL</label>
      <input type="text" id="cfgOllamaUrl" value="http://localhost:11434" placeholder="http://localhost:11434">
      <label>Model</label>
      <input type="text" id="cfgOllamaModel" value="qwen2.5" placeholder="qwen2.5">
    </div>
    <div class="config-actions">
      <button class="save-btn" id="saveConfig">保存配置</button>
    </div>
    <div class="model-status" id="modelStatus">状态：待配置</div>
  </div>
</div>

<div class="ending-overlay" id="endingOverlay">
  <div class="ending-card">
    <h2 id="endingTitle"></h2>
    <div class="desc" id="endingDesc"></div>
    <button id="endingRestart">重新入世</button>
  </div>
</div>

<script>
// ============================================================
//  状 态 管 理
// ============================================================
const DEFAULT = { cultivation:10, fortune:10, day:1, round:0, history:[], ended:false };
let G = loadState();
function $(id){ return document.getElementById(id); }

function loadState(){
  try{
    const r = localStorage.getItem("yunyou_state");
    if(r) return {...DEFAULT, ...JSON.parse(r)};
  }catch(e){}
  return {...DEFAULT};
}
function saveState(){
  try{ localStorage.setItem("yunyou_state", JSON.stringify(G)); }catch(e){}
}

function resetState(){
  G = {...DEFAULT};
  saveState();
  const box = $("chatMessages");
  box.innerHTML = "";
  // 随机开局场景
  const openings = [
    "你在一座不知名的山脚下醒来。暮色四合，远处有钟声传来。山间有路，不知通向何处。",
    "你站在一座热闹的修仙坊市中，周围是叫卖的散修和琳琅的法器摊位。没有人注意到你。",
    "一场大战之后，你从废墟中爬出来。身边横七竖八躺着尸体，你记不清自己是谁。",
    "你在深山古刹中打坐醒来。窗外大雪纷飞，一个老僧背对着你，正在慢吞吞地扫地。",
    "你是某个小宗门的外门弟子，今天是宗门大比的日子。演武场上人声鼎沸，而你——还不会一招像样的术法。"
  ];
  const op = openings[Math.floor(Math.random() * openings.length)];
  writeSystem(op);
  renderChoices([
    {label:"A", text:"环顾四周"},
    {label:"B", text:"迈步向前"},
    {label:"C", text:"闭上眼睛感受灵气"}
  ], box);
  $("endingOverlay").classList.remove("open");
  $("userInput").disabled = false;
  $("sendBtn").disabled = false;
  renderUI();
}

// ============================================================
//  UI 渲染
// ============================================================
function renderUI(){
  const c = Math.min(100, Math.max(0, G.cultivation));
  const f = Math.min(100, Math.max(0, G.fortune));
  $("cultFill").style.width = c + "%";
  $("fortFill").style.width = f + "%";
  $("cultVal").textContent = G.cultivation;
  $("fortVal").textContent = G.fortune;
  $("dayVal").textContent = Math.ceil(G.day);
  $("roundVal").textContent = G.round;

  // 修为颜色
  const cultEl = $("cultFill");
  if(c >= 70) cultEl.style.background = "linear-gradient(90deg,#4a7a9a,#6a9aba)";
  else if(c >= 40) cultEl.style.background = "linear-gradient(90deg,#3a5a7a,#5a8aaa)";
  else cultEl.style.background = "linear-gradient(90deg,#2a4a5a,#4a6a7a)";

  const fortEl = $("fortFill");
  if(f >= 70) fortEl.style.background = "linear-gradient(90deg,#5a9a5a,#7aba7a)";
  else if(f >= 40) fortEl.style.background = "linear-gradient(90deg,#5a7a3a,#7aaa5a)";
  else fortEl.style.background = "linear-gradient(90deg,#4a6a3a,#6a8a5a)";
}

function addMessage(role, content){
  const box = $("chatMessages");
  const d = document.createElement("div");
  d.className = "message " + role;
  const cls = role==="player"?"player-bubble":role==="system"?"system-bubble":"ai-bubble";
  d.innerHTML = '<div class="message-bubble '+cls+'">'+content.replace(/\n/g,'<br>')+'</div>';
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  G.history.push({role,content});
  if(G.history.length > 200) G.history.splice(0,20);
}

function writeSystem(t){ addMessage("system", t); }

// ============================================================
//  选 项 系 统
// ============================================================
function parseChoices(text){
  const pattern = /【选项([ABC])】([^【]*)/g;
  const choices = [];
  let m;
  while((m = pattern.exec(text)) !== null) choices.push({label:m[1], text:m[2].trim()});
  return choices.length === 3 ? choices : [];
}
function stripChoices(text){
  return text.replace(/\n?【选项[ABC]】[^【]*/g,'').trim();
}
function renderChoices(choices, container){
  if(!choices||!choices.length) return;
  // 清除旧的选择按钮
  document.querySelectorAll(".choice-group").forEach(el => el.remove());
  const div = document.createElement("div");
  div.className = "message choice-group";
  div.style="margin-top:4px;display:flex;gap:6px";
  
  let labels = ["A","B","C"];
  choices.forEach((ch,i) => {
    const btn = document.createElement("button");
    btn.className = "event-btn";
    btn.style="flex:1;text-align:center;padding:9px 8px;background:#1e301e;border:1px solid #3a6a3a;border-radius:8px;color:#b8d8a8;font-size:.82rem;cursor:pointer;font-family:inherit";
    btn.textContent = ch.label + ". " + ch.text;
    btn.onmouseover = ()=>{btn.style.background="#2a4a2a";btn.style.borderColor="#4a8a4a"};
    btn.onmouseout = ()=>{btn.style.background="#1e301e";btn.style.borderColor="#3a6a3a"};
    btn.onclick = ()=>{
      div.remove();
      const input = $("userInput");
      input.value = ch.text;
      handleSend();
    };
    div.appendChild(btn);
  });
  container.appendChild(div);
}

// ============================================================
//  配 置
// ============================================================
let cfg = null;
function loadCfg(){
  try{
    const r = localStorage.getItem("yunyou_cfg");
    if(r){
      cfg = JSON.parse(r);
      if(cfg.openai){
        $("cfgOpenaiUrl").value = cfg.openai.baseUrl || "";
        $("cfgOpenaiKey").value = cfg.openai.apiKey || "";
        $("cfgOpenaiModel").value = cfg.openai.model || "";
      }
      if(cfg.ollama){
        $("cfgOllamaUrl").value = cfg.ollama.baseUrl || "http://localhost:11434";
        $("cfgOllamaModel").value = cfg.ollama.model || "qwen2.5";
      }
      if(cfg.mode === "ollama"){
        document.querySelectorAll(".config-tabs button").forEach(b => {
          b.classList.toggle("active", b.dataset.mode === "ollama");
        });
        $("openaiForm").classList.add("hidden");
        $("ollamaForm").classList.remove("hidden");
      }
    }
  }catch(e){}
}
function saveCfg(){
  const mode = document.querySelector(".config-tabs button.active").dataset.mode;
  cfg = {
    mode,
    openai: { baseUrl: $("cfgOpenaiUrl").value.trim(), apiKey: $("cfgOpenaiKey").value.trim(), model: $("cfgOpenaiModel").value.trim() },
    ollama: { baseUrl: $("cfgOllamaUrl").value.trim()||"http://localhost:11434", model: $("cfgOllamaModel").value.trim()||"qwen2.5" }
  };
  localStorage.setItem("yunyou_cfg", JSON.stringify(cfg));
  const hasKey = cfg.openai && cfg.openai.apiKey;
  $("modelStatus").textContent = hasKey ? "✅ 已配置" : "⚠️ API Key 为空";
  $("modelStatus").className = hasKey ? "model-status" : "model-status error";
}

// ============================================================
//  AI 调 用
// ============================================================
async function callAI(messages){
  if(!cfg) throw new Error("请先配置模型");
  const ctl = new AbortController();
  const timer = setTimeout(() => ctl.abort(), 10000);
  try{
    if(cfg.mode === "ollama"){
      const url = cfg.ollama.baseUrl.replace(/\/+$/,"")+"/api/chat";
      const r = await fetch(url, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model: cfg.ollama.model,
          messages: messages.map(m=>({role:m.role,content:m.content})),
          stream:false,
          options:{temperature:0.85}
        }),
        signal: ctl.signal
      });
      if(!r.ok) throw new Error("Ollama: "+r.status);
      return (await r.json()).message.content;
    } else {
      const base = cfg.openai.baseUrl.replace(/\/+$/,"");
      const r = await fetch(base+"/chat/completions", {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+cfg.openai.apiKey},
        body:JSON.stringify({
          model: cfg.openai.model||"gpt-4",
          messages: messages,
          temperature: 0.85,
          max_tokens: 600
        }),
        signal: ctl.signal
      });
      if(!r.ok) throw new Error("API: "+r.status+" "+r.statusText);
      return (await r.json()).choices[0].message.content;
    }
  }finally{ clearTimeout(timer); }
}

function buildPrompt(){
  return [
    { role: "system", content: `你是「云游志」的游戏主持（Game Master），一个修仙/仙侠世界的叙事引擎。

=== 现状 ===
修为：${G.cultivation}/100（修行境界和实力）
机缘：${G.fortune}/100（气运和际遇）
第 ${Math.ceil(G.day)} 天
累计行动：${G.round} 次

=== 规则 ===
1. 每次生成一段沉浸式叙事回复（中文，80-150字）。
2. 文学化风格，有画面感和细节，不要网文套路。
3. 每次回复结尾必须提供3个选项，格式：
   【选项A】具体行动描述
   【选项B】具体行动描述
   【选项C】具体行动描述
4. 玩家可以不选选项，自由输入任何行动。你要灵活响应。
5. 世界是动态的——NPC、地点、事件、敌人、机缘都由你创造。
6. 保持叙事连贯性：记住之前发生过什么。
7. 修为和机缘会影响叙事走向：修者强时遇到更强的挑战，机缘好时遇到奇遇。
8. 当故事走向自然结局（飞升、陨落、归隐、入魔等）时，用【结局】标记。
   格式：
   叙事内容……
   【结局】结局名称
   结局描述……

=== 叙事风格 ===
- 偏现实主义+古典文学，像《聊斋》《阅微草堂笔记》的感觉
- 对话有潜台词，行为有动机
- 世界有质感：风雨、冷暖、饥饿、疲惫
- 每次开局应当生成完全不同的世界和起点，不要重复设定
- NPC要有自己的性格和目的，不是工具人

开始叙事。第一句先描述玩家所处的环境、时间和处境，然后给出3个选项。` }
  ];
}

// ============================================================
//  游 戏 核 心
// ============================================================
function processEngagement(text){
  // AI自我管理修为和机缘，这里只做微调
  let c = 0, f = 0;
  // 悟道/修行/探索相关
  if(/悟|修|练|参|静坐|打坐|钻研|参悟|修炼|运气/.test(text)) c += Math.floor(Math.random()*3)+1;
  // 行善/助人相关
  else if(/帮|救|助|施|善|让/.test(text)) f += Math.floor(Math.random()*3)+1;
  // 冒险/探索相关
  else if(/走|去|探|寻|找|闯|追/.test(text)) f += Math.floor(Math.random()*2);
  // 战斗/对抗相关
  else if(/战|斗|攻|杀|打|剑/.test(text)) c += Math.floor(Math.random()*4)+1;
  // 消极/退缩
  else if(/逃|躲|退|怕|不/.test(text)) { c -= Math.floor(Math.random()*2)+1; f -= Math.floor(Math.random()*2); }
  // 默认
  else { c += Math.floor(Math.random()*3)-1; f += Math.floor(Math.random()*3)-1; }
  G.cultivation = Math.min(100, Math.max(0, G.cultivation + c));
  G.fortune = Math.min(100, Math.max(0, G.fortune + f));
  if(c!==0||f!==0){
    const parts = [];
    if(c>0) parts.push("修为 +"+c); if(c<0) parts.push("修为 "+c);
    if(f>0) parts.push("机缘 +"+f); if(f<0) parts.push("机缘 "+f);
    writeSystem("（" + parts.join("，") + "）");
  }
}

// ============================================================
//  发送消息
// ============================================================
async function handleSend(){
  const input = $("userInput");
  const text = input.value.trim();
  if(!text || G.ended) return;
  input.value = "";
  $("sendBtn").disabled = true;

  addMessage("player", text);
  G.round++;
  G.day = G.round / 3 + 1;

  processEngagement(text);
  renderUI();
  saveState();

  if(G.ended){ $("sendBtn").disabled = false; return; }

  try {
    const msgs = buildPrompt();
    const recent = G.history.slice(-20);
    for(const m of recent) msgs.push({role:m.role, content:m.content});
    const reply = await callAI(msgs);

    // 检查结局标记
    if(reply.includes("【结局】")){
      const endMatch = reply.match(/【结局】([^\n]+)\n([\s\S]*)/);
      if(endMatch){
        G.ended = true;
        saveState();
        const clean = stripChoices(endMatch[0] || reply);
        addMessage("ai", clean.replace(/【结局】[^\n]*/,''));
        $("endingTitle").textContent = "🏁 " + endMatch[1].trim();
        $("endingDesc").textContent = endMatch[2].trim();
        $("endingOverlay").classList.add("open");
        $("userInput").disabled = true;
        $("sendBtn").disabled = true;
        renderUI();
        $("sendBtn").disabled = false;
        return;
      }
    }

    const choices = parseChoices(reply);
    const clean = stripChoices(reply);
    addMessage("ai", clean);
    if(choices.length){
      renderChoices(choices, $("chatMessages"));
      $("chatMessages").scrollTop = $("chatMessages").scrollHeight;
    }
  } catch(e){
    console.warn("AI failure:", e);
    $("modelStatus").textContent = "⚠️ " + (e.message||"请求失败");
    $("modelStatus").className = "model-status error";

    const fallbacks = [
      { text: "你沿着山路走了不久，前方出现一座石桥。桥下流水湍急，对岸隐约有人影。", choices: ["过桥", "沿溪而下", "在桥头歇息"] },
      { text: "你在林中遇到一位采药老人。他看了你一眼，说：「年轻人，前面可不是什么好去处。」", choices: ["问为什么", "执意前行", "向老人问路"] },
      { text: "天色暗了。远处升起炊烟，像是有村落。近处有一座废弃的亭子，石桌上有半局残棋。", choices: ["去村落投宿", "在亭中过夜", "研究那局残棋"] },
      { text: "一阵异香飘来。你循香而去，发现一株通体透明的草药，灵气浓郁。但旁边卧着一头似虎非虎的妖兽。", choices: ["冒险采药", "悄悄退走", "尝试与妖兽沟通"] },
      { text: "你走到一处悬崖边。崖下有云海翻涌，崖壁上刻着几行古字，像是什么心法口诀。", choices: ["记下口诀", "纵身跃入云海", "沿崖壁寻找路径"] },
    ];
    const fb = fallbacks[G.round % fallbacks.length];
    addMessage("ai", fb.text);
    renderChoices(fb.choices.map((t,i)=>({label:"ABC"[i],text:t})), $("chatMessages"));
  }

  renderUI();
  saveState();
  $("sendBtn").disabled = false;
  input.focus();
}

// ============================================================
//  初 始 化
// ============================================================
function init(){
  loadCfg();

  $("configToggle").onclick = ()=>$("configPanel").classList.toggle("open");
  document.querySelectorAll(".config-tabs button").forEach(b=>{b.onclick=function(){
    document.querySelectorAll(".config-tabs button").forEach(x=>x.classList.remove("active"));
    this.classList.add("active");
    $("openaiForm").classList.toggle("hidden", this.dataset.mode!=="openai");
    $("ollamaForm").classList.toggle("hidden", this.dataset.mode!=="ollama");
  }});
  $("saveConfig").onclick = saveCfg;
  $("sendBtn").onclick = handleSend;
  $("userInput").onkeydown = e => { if(e.key==="Enter") handleSend(); };
  $("resetBtn").onclick = ()=>{ if(confirm("重新入世？当前进度将消失。")) resetState(); };
  $("endingRestart").onclick = resetState;

  // 读取已有进度或开局
  if(G.history.length > 0){
    const box = $("chatMessages");
    box.innerHTML = "";
    for(const m of G.history) addMessage(m.role, m.content);
    if(G.ended){ $("userInput").disabled = true; $("sendBtn").disabled = true; }
  } else {
    resetState();
  }

  // 配置状态
  if(!cfg){
    cfg = {
      mode:"openai",
      openai:{baseUrl:"https://maas-coding-api.cn-huabei-1.xf-yun.com/v2", apiKey:"", model:"astron-code-latest"},
      ollama:{baseUrl:"http://localhost:11434", model:"qwen2.5"}
    };
    localStorage.setItem("yunyou_cfg", JSON.stringify(cfg));
    $("cfgOpenaiUrl").value = cfg.openai.baseUrl;
    $("cfgOpenaiModel").value = cfg.openai.model;
  }
  if(cfg.openai.apiKey){
    $("modelStatus").textContent = "✅ 已配置";
    $("modelStatus").className = "model-status";
  } else {
    $("modelStatus").textContent = "⚠️ 未配置 API Key，将以规则模式运行";
    $("modelStatus").className = "model-status error";
  }
}

// URL reset handler
if(location.search.includes("reset=1")){
  localStorage.removeItem("yunyou_state");
  localStorage.removeItem("yunyou_cfg");
  location.replace(location.pathname);
}

document.addEventListener("DOMContentLoaded", init);
</script>
