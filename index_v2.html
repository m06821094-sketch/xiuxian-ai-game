<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霁月宗 · 青砚叙事</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;background:#0a0f0e;color:#c0d0b8;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.game-container{width:100%;max-width:960px;background:linear-gradient(145deg,#101a12 0%,#141f16 100%);border:1px solid #1f3322;border-radius:12px;box-shadow:0 8px 48px rgba(0,0,0,.7);overflow:hidden}
.game-header{padding:18px 24px 12px;text-align:center;border-bottom:1px solid #1f2f1f}
.game-header h1{font-size:1.5rem;font-weight:400;color:#a8c8a0;letter-spacing:6px;text-shadow:0 0 20px rgba(80,180,80,.08)}
.game-header .sub{font-size:.8rem;color:#5a7a5a;margin-top:1px;letter-spacing:3px}
.game-main{display:flex;height:540px}
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid #1a2a1a}
.chat-messages{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:#1f3a22;border-radius:4px}
.message{margin-bottom:12px}
.msg-b{display:inline-block;max-width:86%;padding:10px 14px;border-radius:8px;font-size:.88rem;line-height:1.65;word-break:break-word;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.pl{text-align:right}.pl .msg-b{background:#172a18;border:1px solid #1f3f1f;color:#c8ddc0;border-bottom-right-radius:2px}
.npc{text-align:left}.npc .msg-b{background:#121f14;border:1px solid #1a2f1a;color:#b0c8a8;border-bottom-left-radius:2px}
.sys{text-align:center}.sys .msg-b{background:#0a140c;border:1px solid #142414;color:#7a9a7a;font-size:.78rem;max-width:92%;border-radius:6px}
.choice-grp{display:flex;gap:5px;margin-top:3px;margin-bottom:8px}
.choice-grp button{flex:1;padding:8px 6px;background:#142414;border:1px solid #2a4a2a;border-radius:6px;color:#b0d0a0;font-size:.8rem;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
.choice-grp button:hover{background:#1f3a1f;border-color:#3a6a3a}
.chat-in{display:flex;gap:6px;padding:10px 12px 12px;border-top:1px solid #1a2a1a;background:#0e1810}
.chat-in input{flex:1;padding:8px 12px;background:#0a140c;border:1px solid #1f2f1f;border-radius:6px;color:#c8ddc0;font-size:.88rem;outline:none;font-family:inherit}
.chat-in input:focus{border-color:#2a5a2a}
.chat-in input::placeholder{color:#3f5a3f}
.send-btn{padding:8px 16px;background:#1f3f1f;border:none;border-radius:6px;color:#c8ddc0;font-size:.88rem;cursor:pointer;font-family:inherit;transition:background .2s}
.send-btn:hover{background:#2a5a2a}.send-btn:disabled{opacity:.35;cursor:default}
.status{width:210px;flex-shrink:0;padding:16px;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,#0f1a10 0%,#0a140c)}
.status h2{font-size:.85rem;font-weight:400;color:#5a7a5a;text-align:center;border-bottom:1px solid #142414;padding-bottom:6px;letter-spacing:3px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat .l{font-size:.75rem;color:#5a7a5a}
.pr{display:flex;align-items:center;gap:6px}
.pb{flex:1;height:5px;background:#08120a;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s}
.pf.fav{background:linear-gradient(90deg,#3a5a3a,#5a8a4a)}
.pf.karma{background:linear-gradient(90deg,#5a3a3a,#8a4a4a)}
.pv{font-size:.78rem;color:#7a9a7a;min-width:24px;text-align:right}
.sr{display:flex;justify-content:space-between;align-items:center}
.sr .l{font-size:.75rem;color:#5a7a5a}.sr .v{font-size:.8rem;color:#b0c8a8}
.cfg-btn,.rst-btn{padding:7px;background:transparent;border:1px solid #1f2f1f;border-radius:5px;color:#6a8a6a;font-size:.78rem;cursor:pointer;font-family:inherit;margin-top:auto}
.cfg-btn:hover,.rst-btn:hover{border-color:#3f5f3f;color:#a0c0a0}
.cfg-panel{padding:14px 18px 18px;border-top:1px solid #1a2a1a;background:#0a120c;display:none}
.cfg-panel.on{display:block}
.cfg-panel h3{font-size:.85rem;color:#7a9a7a;margin-bottom:8px;font-weight:400}
.ct{display:flex;gap:3px;margin-bottom:8px}
.ct button{flex:1;padding:5px;background:#0e180e;border:1px solid #1f2f1f;border-radius:5px;color:#5a7a5a;font-size:.78rem;cursor:pointer;font-family:inherit}
.ct button.on{background:#142414;border-color:#2a5a2a;color:#a0c0a0}
.cf{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.cf label{font-size:.72rem;color:#4a6a4a}
.cf input{padding:5px 8px;background:#0a140c;border:1px solid #1f2f1f;border-radius:5px;color:#c0d0b8;font-size:.8rem;outline:none;font-family:inherit}
.cf input:focus{border-color:#2a5a2a}
.cf.h{display:none}
.ca{display:flex;gap:6px;margin-top:6px}
.sv-btn{flex:1;padding:6px;background:#1f3f1f;border:none;border-radius:5px;color:#c8ddc0;font-size:.8rem;cursor:pointer;font-family:inherit}
.sv-btn:hover{background:#2a5a2a}
.ms{font-size:.72rem;color:#5a8a5a;margin-top:5px;text-align:center}
.ms.err{color:#8a5a5a}
@media(max-width:640px){body{padding:8px}.game-main{flex-direction:column;height:auto}.chat-panel{border-right:none;min-height:380px}.status{width:100%;flex-direction:row;flex-wrap:wrap;gap:6px;padding:10px;border-top:1px solid #1a2a1a}.status h2{display:none}.stat{flex:1;min-width:70px}}
</style>
</head>
<body>

<div class="game-container">
  <div class="game-header">
    <h1>霁 月 宗</h1>
    <div class="sub">— 青 砚 叙 事 —</div>
  </div>

  <div class="game-main">
    <div class="chat-panel">
      <div class="chat-messages" id="msgs"></div>
      <div class="chat-in">
        <input type="text" id="inp" placeholder="输入你的行动..." autocomplete="off">
        <button class="send-btn" id="snd">↵</button>
      </div>
    </div>

    <div class="status">
      <h2>· 状 ·</h2>
      <div class="stat">
        <span class="l">师恩</span>
        <div class="pr"><div class="pb"><div class="pf fav" id="favFill"></div></div><span class="pv" id="favVal">30</span></div>
      </div>
      <div class="stat">
        <span class="l">业障</span>
        <div class="pr"><div class="pb"><div class="pf karma" id="karmaFill"></div></div><span class="pv" id="karmaVal">0</span></div>
      </div>
      <div class="sr"><span class="l">天数</span><span class="v" id="dayV">1</span></div>
      <div class="sr"><span class="l">轮次</span><span class="v" id="rndV">0</span></div>
      <button class="cfg-btn" id="cfgT">⚙️ 配置</button>
      <button class="rst-btn" id="rst">⟳ 重新开始</button>
    </div>
  </div>

  <div class="cfg-panel" id="cfgP">
    <h3>模型配置</h3>
    <div class="ct">
      <button class="on" data-m="openai">OpenAI 兼容</button>
      <button data-m="ollama">Ollama</button>
    </div>
    <div class="cf" id="oaF">
      <label>Base URL</label>
      <input type="text" id="oaUrl" value="https://maas-coding-api.cn-huabei-1.xf-yun.com/v2">
      <label>API Key</label>
      <input type="password" id="oaKey">
      <label>Model</label>
      <input type="text" id="oaMod" value="astron-code-latest">
    </div>
    <div class="cf h" id="olF">
      <label>Base URL</label>
      <input type="text" id="olUrl" value="http://localhost:11434">
      <label>Model</label>
      <input type="text" id="olMod" value="qwen2.5">
    </div>
    <div class="ca"><button class="sv-btn" id="svCfg">保存</button></div>
    <div class="ms" id="mStatus">状态：待配置</div>
  </div>
</div>

<script>
// ===== 状态管理 =====
const DFLT = { favor:30, karma:0, day:1, round:0, history:[], ended:false };
let G = loadState();
const $ = id => document.getElementById(id);

function loadState(){
  try{ const r = localStorage.getItem("jy_state"); if(r) return {...DFLT, ...JSON.parse(r)}; }catch(e){}
  return {...DFLT};
}
function saveState(){ try{ localStorage.setItem("jy_state", JSON.stringify(G)); }catch(e){} }

function resetState(){
  G = {...DFLT};
  saveState();
  const box = $("msgs"); box.innerHTML = "";
  writeSys("霁月宗，苍梧山。冬月十七，晨。\n\n你跪在戒律院外的石阶上，已经跪了大半个时辰了。膝盖冻得发麻，但你不敢动。\n\n门终于开了。\n\n青砚真人站在门槛内，目光扫过你肩上的雪，停了一瞬。\n\n「进来。」\n\n她先转身进去了。你没有起身——你是被罚跪的，没有她的准许，不能起。\n\n过了几息，里头传来一声：「还要我请你？」声音平平的，听不出情绪。");
  renderChoices([
    {l:"A", t:"低头跟进去"},
    {l:"B", t:"跪着不动，等她再说一句"},
    {l:"C", t:"站起身，在门口顿了顿再进"}
  ], box);
  $("inp").disabled = false; $("snd").disabled = false;
  renderUI();
}

// ===== UI =====
function renderUI(){
  const f = Math.min(100, Math.max(0, G.favor));
  const k = Math.min(100, Math.max(0, G.karma));
  $("favFill").style.width = f + "%";
  $("karmaFill").style.width = k + "%";
  $("favVal").textContent = G.favor;
  $("karmaVal").textContent = G.karma;
  $("dayV").textContent = Math.ceil(G.day);
  $("rndV").textContent = G.round;
}

function addMsg(role, content){
  const box = $("msgs");
  const d = document.createElement("div");
  d.className = "message " + role;
  const cls = role==="pl"?"pl":role==="sys"?"sys":"npc";
  d.innerHTML = '<div class="msg-b ' + (role==="pl"?"pl":role==="sys"?"sys":"npc") + '">' + content.replace(/\n/g,'<br>') + '</div>';
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  G.history.push({role,content});
  if(G.history.length > 300) G.history.splice(0,30);
}

function writeSys(t){ addMsg("sys", t); }

// ===== 选项 =====
function parseChoices(text){
  const p = /【选项([ABC])】([^【]*)/g; const c = []; let m;
  while((m=p.exec(text)) !== null) c.push({l:m[1], t:m[2].trim()});
  return c.length === 3 ? c : [];
}
function stripChoices(text){ return text.replace(/\n?【选项[ABC]】[^【]*/g,'').trim(); }

function renderChoices(choices, container){
  if(!choices||!choices.length) return;
  document.querySelectorAll(".choice-grp").forEach(el => el.remove());
  const div = document.createElement("div");
  div.className = "choice-grp";
  choices.forEach(ch => {
    const btn = document.createElement("button");
    btn.textContent = ch.l + ". " + ch.t;
    btn.onclick = () => {
      div.remove();
      $("inp").value = ch.t;
      handleSend();
    };
    div.appendChild(btn);
  });
  container.appendChild(div);
}

// ===== 配置 =====
let cfg = null;
function loadCfg(){
  try{
    const r = localStorage.getItem("jy_cfg");
    if(r){
      cfg = JSON.parse(r);
      if(cfg.openai){ $("oaUrl").value = cfg.openai.baseUrl||""; $("oaKey").value = cfg.openai.apiKey||""; $("oaMod").value = cfg.openai.model||""; }
      if(cfg.ollama){ $("olUrl").value = cfg.ollama.baseUrl||"http://localhost:11434"; $("olMod").value = cfg.ollama.model||"qwen2.5"; }
      if(cfg.mode==="ollama"){
        document.querySelectorAll(".ct button").forEach(b => b.classList.toggle("on", b.dataset.m==="ollama"));
        $("oaF").classList.add("h"); $("olF").classList.remove("h");
      }
    }
  }catch(e){}
}
function saveCfg(){
  const mode = document.querySelector(".ct button.on").dataset.m;
  cfg = { mode,
    openai:{baseUrl:$("oaUrl").value.trim(), apiKey:$("oaKey").value.trim(), model:$("oaMod").value.trim()},
    ollama:{baseUrl:$("olUrl").value.trim()||"http://localhost:11434", model:$("olMod").value.trim()||"qwen2.5"}
  };
  localStorage.setItem("jy_cfg", JSON.stringify(cfg));
  const hk = cfg.openai && cfg.openai.apiKey;
  $("mStatus").textContent = hk ? "✅ 已配置" : "⚠️ API Key 为空";
  $("mStatus").className = hk ? "ms" : "ms err";
}

// ===== AI =====
async function callAI(msgs){
  if(!cfg) throw new Error("请先配置模型");
  const ctl = new AbortController();
  const tmr = setTimeout(() => ctl.abort(), 12000);
  try{
    if(cfg.mode === "ollama"){
      const url = cfg.ollama.baseUrl.replace(/\/+$/,"") + "/api/chat";
      const r = await fetch(url, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:cfg.ollama.model, messages:msgs.map(m=>({role:m.role,content:m.content})), stream:false, options:{temperature:0.8}}),
        signal: ctl.signal
      });
      if(!r.ok) throw new Error("Ollama: "+r.status);
      return (await r.json()).message.content;
    } else {
      const base = cfg.openai.baseUrl.replace(/\/+$/,"");
      const r = await fetch(base+"/chat/completions", {
        method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+cfg.openai.apiKey},
        body:JSON.stringify({model:cfg.openai.model||"gpt-4", messages:msgs, temperature:0.8, max_tokens:700}),
        signal: ctl.signal
      });
      if(!r.ok) throw new Error("API: "+r.status);
      return (await r.json()).choices[0].message.content;
    }
  }finally{ clearTimeout(tmr); }
}

function buildPrompt(){
  const fDesc = G.favor < 30 ? "她对季临川很失望，话极少，目光不落在他身上。" :
    G.favor < 60 ? "她对这个弟子还算留神，但语气始终是公事公办。" :
    G.favor < 80 ? "她开始会在无人时多看季临川一眼，但话里仍不露声色。" :
    "她对季临川的偏护已经到了自己都未必察觉的程度。执法时依然严格，但执行方式上总有一些微妙的偏移。";

  const kDesc = G.karma < 20 ? "季临川近期还算安分。" :
    G.karma < 50 ? "季临川身上背着几笔旧账，戒律院盯着他。" :
    G.karma < 80 ? "季临川的违规记录越来越厚。再犯一次，谁都护不住他。" :
    "季临川已经站在被逐出师门的边缘了。";

  return [
    {role:"system", content:
`你是修仙世界「霁月宗」的叙事生成器。

=== 核心设定 ===
萧青砚（青砚真人），霁月宗戒律院长老。
季临川，她的弟子——天赋极高，性格叛逆。

=== 现状 ===
师恩（青砚对季临川的信任）：${G.favor}/100
业障（季临川的违规累积）：${G.karma}/100
第 ${Math.ceil(G.day)} 天

${fDesc}
${kDesc}

=== 核心冲突（永远不能消失） ===
「让一个绝对守规矩的人，在不能破坏规则的前提下，慢慢失控。」

青砚的行为底层逻辑：
1. 永远优先执行宗门戒律
2. 不允许明显徇私
3. 允许「合法范围内的微小偏移」
4. 情绪只能通过行为偏差体现，绝不直接表达
5. 若情绪压力过高 → 表现为更严格的执法

=== 剧情生成规则 ===
每一轮必须生成一个事件，类型轮流切换：
• 违规事件：季临川触犯门规（私斗、夜出、顶撞等）
• 执法事件：青砚处理季临川（审判、罚跪、禁闭、鞭罚等）
• 沉默事件：没有冲突，但关系在安静中推进（眼神、遗漏、未尽之言）

=== 对话风格 ===
青砚：冷静、简短、克制。不说「我担心/我在意/我喜欢」。用「戒律/宗门/规矩」表达一切。
季临川：情绪更直接，可反抗规则，但不理解规则体系的全部逻辑。

=== 输出格式 ===
每次回复包含叙事内容 + 3个选项：
【选项A】行动描述
【选项B】行动描述
【选项C】行动描述

选项要贴合当前情境和人物性格。青砚的视角选项要体现「规矩内的偏移」这种张力。

=== 禁止 ===
• 禁止现代恋爱表达
• 禁止直接写「她爱他」或心理分析式叙述
• 禁止角色脱离宗门伦理逻辑
• 不要结局。要持续张力循环。

开始叙事。先描述当前场景。`}
  ];
}

// ===== 游戏逻辑 =====
function processEngagement(text){
  let fav = 0, krm = 0;
  // 恭顺/受教 → 师恩+
  if(/弟子知错|弟子明白|遵命|是|谢师尊|谢真人|弟子不敢|受教|知道了|认罚/.test(text)) { fav += 2 + Math.floor(Math.random()*3); krm -= Math.floor(Math.random()*2); }
  // 认错/低头 → 业障-
  else if(/我错了|是我的错|对不起|我不该|弟子有罪/.test(text)) { fav += Math.floor(Math.random()*2); krm -= 2 + Math.floor(Math.random()*3); }
  // 关心师尊 → 师恩+
  else if(/您没事吧|您辛苦了|您还好|您的伤|担心您|您脸色/.test(text)) { fav += 3 + Math.floor(Math.random()*3); }
  // 顶撞/抗命 → 师恩- 业障+
  else if(/凭什么|为什么|我不服|不要你管|你管不着|凭什么罚我/.test(text)) { fav -= 3 + Math.floor(Math.random()*3); krm += 2 + Math.floor(Math.random()*3); }
  // 违纪行为 → 业障+
  else if(/偷偷|溜出去|翻墙|夜出|禁地|偷|闯/.test(text)) { krm += 3 + Math.floor(Math.random()*3); }
  // 沉默/回避 → 微小波动
  else if(/……|\.\.\.|算了|没什么|沉默|不语/.test(text)) { fav--; }
  // 努力修炼 → 师恩+
  else if(/修炼|练剑|打坐|悟|参|修行|练功|剑法/.test(text)) { fav += 1 + Math.floor(Math.random()*2); }
  // 默认
  else { fav += Math.floor(Math.random()*3)-1; krm += Math.floor(Math.random()*2)-1; }

  G.favor = Math.min(100, Math.max(0, G.favor + fav));
  G.karma = Math.min(100, Math.max(0, G.karma + krm));
  if(fav !== 0 || krm !== 0){
    const parts = [];
    if(fav > 0) parts.push("师恩 +"+fav); if(fav < 0) parts.push("师恩 "+fav);
    if(krm > 0) parts.push("业障 +"+krm); if(krm < 0) parts.push("业障 "+krm);
    writeSys("（" + parts.join("，") + "）");
  }
}

// ===== 发送 =====
async function handleSend(){
  const inp = $("inp");
  const text = inp.value.trim();
  if(!text || G.ended) return;
  inp.value = "";
  $("snd").disabled = true;

  addMsg("pl", text);
  G.round++;
  G.day = G.round / 3 + 1;

  processEngagement(text);
  renderUI();
  saveState();

  if(G.ended){ $("snd").disabled = false; return; }

  try{
    const msgs = buildPrompt();
    const recent = G.history.slice(-20);
    for(const m of recent) msgs.push({role:m.role==="pl"?"user":m.role==="npc"?"assistant":"system", content:m.content});
    const reply = await callAI(msgs);
    const choices = parseChoices(reply);
    const clean = stripChoices(reply);
    addMsg("npc", clean);
    if(choices.length) { renderChoices(choices, $("msgs")); $("msgs").scrollTop = $("msgs").scrollHeight; }
  } catch(e){
    console.warn(e);
    $("mStatus").textContent = "⚠️ "+(e.message||"请求失败");
    $("mStatus").className = "ms err";
    const fallbacks = [
      { t: "青砚真人坐在案后，笔悬在纸上。过了很久，她才开口：「你知道我叫你来是为了什么。」这不是问句。", c: ["弟子知错","弟子不明白","沉默"] },
      { t: "「你最近……修为毫无寸进。」她把卷宗合上，看了你一眼——很淡的一眼。「你自己知道原因。」", c: ["请师尊指点","弟子分心了","低头不语"] },
      { t: "暮色从窗口漫进来。她把笔搁下，揉了揉眉心——你第一次见她做这个动作。像是很累。", c: ["问她是不是不舒服","站着不走","告退"] },
      { t: "「有人看见你昨夜去了后山禁地。」她声音很平，平得反常。「你有什么要说的。」", c: ["承认","辩解","沉默以对"] },
      { t: "戒律院里很静。炉火烧着，偶尔发出一声轻微的爆裂。她翻着一卷旧卷宗，你没有说话，她也没有。", c: ["开口打破沉默","安静等着","问她在看什么"] },
      { t: "「你的剑法是谁教的？」她忽然问。你答了。她沉默了一会儿，说：「明日演武场，我亲自试你。」", c: ["谢师尊","弟子不敢","有些意外地看着她"] },
    ];
    const fb = fallbacks[G.round % fallbacks.length];
    addMsg("npc", fb.t);
    renderChoices(fb.c.map((t,i)=>({l:"ABC"[i],t})), $("msgs"));
  }

  renderUI(); saveState();
  $("snd").disabled = false;
  inp.focus();
}

// ===== 初始化 =====
function init(){
  loadCfg();
  $("cfgT").onclick = ()=>$("cfgP").classList.toggle("on");
  document.querySelectorAll(".ct button").forEach(b=>{b.onclick=function(){
    document.querySelectorAll(".ct button").forEach(x=>x.classList.remove("on"));
    this.classList.add("on");
    $("oaF").classList.toggle("h", this.dataset.m!=="openai");
    $("olF").classList.toggle("h", this.dataset.m!=="ollama");
  }});
  $("svCfg").onclick = saveCfg;
  $("snd").onclick = handleSend;
  $("inp").onkeydown = e => { if(e.key==="Enter") handleSend(); };
  $("rst").onclick = ()=>{ if(confirm("重新开始？当前进度将消失。")) resetState(); };

  if(G.history.length > 0){
    const box = $("msgs"); box.innerHTML = "";
    for(const m of G.history) addMsg(m.role, m.content);
    if(G.ended){ $("inp").disabled = true; $("snd").disabled = true; }
  } else { resetState(); }

  if(!cfg){
    cfg = { mode:"openai", openai:{baseUrl:"https://maas-coding-api.cn-huabei-1.xf-yun.com/v2", apiKey:"", model:"astron-code-latest"}, ollama:{baseUrl:"http://localhost:11434", model:"qwen2.5"} };
    localStorage.setItem("jy_cfg", JSON.stringify(cfg));
    $("oaUrl").value = cfg.openai.baseUrl; $("oaMod").value = cfg.openai.model;
  }
  $("mStatus").textContent = cfg.openai.apiKey ? "✅ 已配置" : "⚠️ 未配置 API Key，将以规则模式运行";
  $("mStatus").className = cfg.openai.apiKey ? "ms" : "ms err";
}

if(location.search.includes("reset=1")){
  localStorage.removeItem("jy_state"); localStorage.removeItem("jy_cfg"); location.replace(location.pathname);
}
document.addEventListener("DOMContentLoaded", init);
</script>
